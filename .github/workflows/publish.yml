name: Publish Java Package to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Package with Maven
        run: mvn clean package -DskipTests

      - name: Publish to Maven Central Portal
        uses: sonatype/central-publisher-action@v2
        with:
          name: relintio-agent
          description: Official Java WAF agent SDK for Relintio.
          version: ${{ github.ref_name }}
          directory: target
          token-auth: true
