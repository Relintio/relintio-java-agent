name: Publish Java Package to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Package with Maven
        run: |
          mvn clean package -DskipTests
          version="${GITHUB_REF_NAME#v}"
          
          mkdir bundle
          cp target/relintio-agent-$version.jar bundle/
          cp target/relintio-agent-$version-sources.jar bundle/
          cp target/relintio-agent-$version-javadoc.jar bundle/
          cp pom.xml bundle/relintio-agent-$version.pom

      - name: Generate GPG Key, Publish, and Sign Bundle
        run: |
          # 1. Define GPG Key generation config
          cat <<EOF > gpg-key-config
          Key-Type: RSA
          Key-Length: 2048
          Subkey-Type: RSA
          Subkey-Length: 2048
          Name-Real: Relintio Operations
          Name-Email: operations@relintio.com
          Expire-Date: 0
          %no-ask-passphrase
          %no-protection
          %commit
          EOF

          # 2. Generate the key pair
          gpg --batch --generate-key gpg-key-config

          # 3. Extract the generated Key ID
          key_id=$(gpg --list-keys --with-colons | grep '^pub' | cut -d: -f5)
          echo "Generated GPG Key ID: $key_id"

          # 4. Publish public key to keyservers
          gpg --keyserver keyserver.ubuntu.com --send-keys "$key_id" || true
          gpg --keyserver keys.openpgp.org --send-keys "$key_id" || true
          gpg --keyserver pgp.mit.edu --send-keys "$key_id" || true
          
          # Wait for keyserver propagation
          sleep 10

          # 5. Sign all files in the bundle
          for file in bundle/*; do
            gpg --detach-sign --armor --pinentry-mode loopback "$file"
          done
          
          # 6. Create deployment zip
          cd bundle
          zip ../bundle.zip *

      - name: Publish to Sonatype Central Portal
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        run: |
          curl --fail -u "$MAVEN_USERNAME:$MAVEN_PASSWORD" \
            -X POST \
            -F "bundle=@bundle.zip" \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC"

